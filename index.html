<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Medication Reminder</title>
 <link rel="stylesheet" href="style.css">
</head>

<body>

 <div class="container">
  <h1>Medication Reminder App</h1>
  <p class="subtitle">Add your medicine and reminder time</p>
  <button id="enableNotifications">Enable Notifications</button>

  <form id="medicineForm">
   <input type="text" id="medicineName" placeholder="Medication name" required>
   <input type="text" id="dosage" placeholder="Dosage (e.g. 500mg)" required>
   <input type="time" id="time" required>
   <textarea id="instructions" placeholder="Instructions"></textarea>
   <button type="submit">Add Medication</button>
  </form>

  <h2>Your Medications</h2>
  <div id="medicineList"></div>

  <button class="clear-btn" onclick="clearAllMedicines()">Clear All</button>
 </div>

 <script src="script.js"></script>
</body>

</html>
